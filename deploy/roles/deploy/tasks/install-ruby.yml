- name: install mise apt signing key
  shell: |
    install -dm 755 /etc/apt/keyrings
    curl -fsSL https://mise.jdx.dev/gpg-key.pub \
      | gpg --dearmor -o /etc/apt/keyrings/mise-archive-keyring.gpg
  args:
    executable: /bin/bash
    creates: /etc/apt/keyrings/mise-archive-keyring.gpg

- name: add mise apt repository
  copy:
    content: |
      deb [signed-by=/etc/apt/keyrings/mise-archive-keyring.gpg arch=amd64,arm64] https://mise.jdx.dev/deb stable main
    dest: /etc/apt/sources.list.d/mise.list
    mode: 0644
  register: mise_repo

- name: update apt cache
  apt:
    update_cache: yes
  when: mise_repo.changed

- name: install mise and ruby build dependencies
  apt:
    pkg:
      - mise
      - autoconf
      - bison
      - build-essential
      - libdb-dev
      - libffi-dev
      - libgdbm-dev
      - libgmp-dev
      - libncurses5-dev
      - libreadline-dev
      - libssl-dev
      - libyaml-dev
      - patch
      - rustc
      - uuid-dev
      - zlib1g-dev
    update_cache: yes
    cache_valid_time: 3600

- name: install ruby via mise
  shell: |
    #!/bin/bash
    set -euo pipefail
    cd {{madek_admin_webapp_dir}}
    mise install ruby
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{madek_admin_webapp_user}}"
  async: 3600
  poll: 10

- name: register ruby dir
  shell: |
    set -euo pipefail
    cd {{madek_admin_webapp_dir}}
    mise where ruby
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{madek_admin_webapp_user}}"
  register: madek_admin_webapp_ruby_dir_result

- name: bundle install
  shell: |
    #!/bin/bash
    set -euo pipefail
    cd {{madek_admin_webapp_dir}}
    eval "$(mise activate bash)"
    bundle install
  args:
    executable: /bin/bash
  become: yes
  become_user: "{{madek_admin_webapp_user}}"
